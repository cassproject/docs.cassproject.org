name: Deploy VuePress Docs to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all versions
        run: npm run docs:buildAll

      - name: Assemble site
        run: |
          mkdir -p site
          # Copy each version's built output
          cp -r v1.3/.vuepress/dist/* site/v1.3/ 2>/dev/null || mkdir -p site/v1.3 && cp -r v1.3/.vuepress/dist/* site/v1.3/
          cp -r v1.4/.vuepress/dist/* site/v1.4/ 2>/dev/null || mkdir -p site/v1.4 && cp -r v1.4/.vuepress/dist/* site/v1.4/
          cp -r v1.5/.vuepress/dist/* site/v1.5/ 2>/dev/null || mkdir -p site/v1.5 && cp -r v1.5/.vuepress/dist/* site/v1.5/
          cp -r v1.6/.vuepress/dist/* site/v1.6/ 2>/dev/null || mkdir -p site/v1.6 && cp -r v1.6/.vuepress/dist/* site/v1.6/
          # Copy version selector as root index
          cp static/index.html site/index.html
          # Preserve custom domain
          cp CNAME site/CNAME
          # Prevent Jekyll processing
          touch site/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
